<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src data:;"
        />
        <style>
            /* {{STYLES}} */
        </style>
    </head>
    <body>
        <!-- Page: Main -->
        <div class="page active" id="pageMain">
            <div class="scope-row">
                <div class="segmented">
                    <button class="seg-btn active" id="scopeGlobal" onclick="setScope('global')">
                        Global
                    </button>
                    <button class="seg-btn" id="scopeWorkspace" onclick="setScope('workspace')">
                        Workspace
                    </button>
                </div>
                <button class="gear-btn" onclick="navigateTo('pageIntegrations')">
                    <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                        />
                    </svg>
                    <span class="gear-badge" id="gearBadge"></span>
                </button>
            </div>

            <div class="input-wrap">
                <input
                    id="taskInput"
                    type="text"
                    placeholder="Add a new task..."
                    spellcheck="false"
                />
                <button class="add-btn" id="addBtn" onclick="submitTask()">+</button>
            </div>

            <div class="progress" id="progressWrap" style="display: none">
                <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
                <span class="progress-label" id="progressLabel"></span>
                <div class="overflow-wrap">
                    <button
                        class="overflow-btn"
                        onclick="toggleOverflow(event)"
                        title="More actions"
                    >
                        &#8943;
                    </button>
                    <div class="overflow-menu" id="overflowMenu" style="display: none"></div>
                </div>
            </div>

            <div id="list"></div>

            <div id="jiraSection"></div>

            <div class="code-todos-wrap">
                <div class="code-todos-toggle" id="ctToggle" onclick="toggleCodeTodos()">
                    <span class="ct-arrow">&#9660;</span>
                    <span class="ct-label">Code TODOs</span>
                    <span class="ct-count" id="ctCount">0</span>
                </div>
                <div class="code-todos-panel" id="ctPanel"></div>
            </div>
        </div>

        <!-- Page: Integrations List -->
        <div class="page" id="pageIntegrations"></div>

        <!-- Page: Jira Settings -->
        <div class="page" id="pageJira"></div>

        <div id="modal-root"></div>

        <script>
            /* {{SCRIPTS}} */

            // Initialize
            vscode.postMessage({ type: 'requestData' });
            vscode.postMessage({ type: 'jiraRequestData' });
        </script>
    </body>
</html>
