<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <style>
            /* {{STYLES}} */
        </style>
    </head>
    <body>
        <div class="segmented">
            <button class="seg-btn active" id="scopeGlobal" onclick="setScope('global')">Global</button>
            <button class="seg-btn" id="scopeWorkspace" onclick="setScope('workspace')">
                Workspace
            </button>
        </div>

        <div class="input-wrap">
            <input id="taskInput" type="text" placeholder="Add a new task..." spellcheck="false" />
            <button class="add-btn" id="addBtn" onclick="submitTask()">+</button>
        </div>

        <div class="progress" id="progressWrap" style="display: none">
            <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
            <span class="progress-label" id="progressLabel"></span>
            <div class="overflow-wrap">
                <button class="overflow-btn" onclick="toggleOverflow(event)" title="More actions">
                    &#8943;
                </button>
                <div class="overflow-menu" id="overflowMenu" style="display: none"></div>
            </div>
        </div>

        <div id="list"></div>

        <div class="code-todos-wrap">
            <div class="code-todos-toggle" id="ctToggle" onclick="toggleCodeTodos()">
                <span class="ct-arrow">&#9660;</span>
                <span class="ct-label">Code TODOs</span>
                <span class="ct-count" id="ctCount">0</span>
            </div>
            <div class="code-todos-panel" id="ctPanel"></div>
        </div>

        <div id="modal-root"></div>

        <script>
            /* {{SCRIPTS}} */

            // Initialize
            vscode.postMessage({ type: 'requestData' });
        </script>
    </body>
</html>
